<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>KYDC Banner (Arc SVG v2)</title>

  <!-- Preload font to ensure it's ready before SVG renders -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="kydd_banner_arc_v2.css" />
</head>
<body>

<script>
  // Force SVG re-render after Oswald font loads
  document.fonts.ready.then(() => {
    const svg = document.querySelector('.kydd-svg');
    if (svg) {
      // Trigger re-layout by briefly hiding and showing
      svg.style.display = 'none';
      svg.offsetHeight; // Force reflow
      svg.style.display = 'block';
    }
  });
</script>

<header class="kydd-banner">
  <div class="kydd-banner-inner" role="img" aria-label="Know Your Damned Computer!">
    <!-- Increased viewBox height to 520 for font descenders; widened arc paths -->
    <svg class="kydd-svg" viewBox="0 0 1200 520" preserveAspectRatio="xMidYMid meet">
      <defs>
        <!-- Longer, gentler arcs to ensure full text fits -->
        <path id="arcTop" d="M50,180 Q600,100 1150,180" />
        <path id="arcMain" d="M30,420 Q600,500 1170,420" />

        <filter id="titleShadow" x="-20%" y="-20%" width="140%" height="140%">
          <feDropShadow dx="2" dy="2" stdDeviation="0.6" flood-color="#2b2b2b" flood-opacity="1"/>
          <feDropShadow dx="5" dy="5" stdDeviation="1.2" flood-color="#000000" flood-opacity="0.14"/>
        </filter>
      </defs>

      <text class="kydd-text kydd-top" filter="url(#titleShadow)">
        <textPath href="#arcTop" startOffset="50%" text-anchor="middle">
          KNOW YOUR
        </textPath>
      </text>

      <text class="kydd-text kydd-main" filter="url(#titleShadow)">
        <textPath href="#arcMain" startOffset="50%" text-anchor="middle">
          DAMNED COMPUTER!
        </textPath>
      </text>
    </svg>
  </div>
</header>

</body>
</html>
