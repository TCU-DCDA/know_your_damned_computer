<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" role="img" aria-label="Regular expressions icon">
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6aa9ff"/>
      <stop offset="100%" stop-color="#8b6bff"/>
    </linearGradient>
    <linearGradient id="g2" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2dd4bf"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000" flood-opacity="0.18"/>
    </filter>
  </defs>
  <g fill="none" stroke-linecap="round" stroke-linejoin="round" stroke-width="18" filter="url(#shadow)">
    <circle cx="230" cy="230" r="90" fill="url(#g2)" opacity="0.16" stroke="url(#g1)"/>
    <line x1="296" y1="296" x2="370" y2="370" stroke="url(#g1)"/>
    <rect x="352" y="350" width="40" height="70" rx="12" fill="url(#g2)" opacity="0.2" stroke="url(#g1)"/>

    <text x="160" y="235" font-family="monospace" font-size="56" fill="url(#g1)">.*?</text>
    <text x="170" y="290" font-family="monospace" font-size="40" fill="url(#g1)" opacity="0.85">[a-z]</text>
  </g>
</svg>
