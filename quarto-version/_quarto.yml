project:
  type: website
  output-dir: _site
  render:
    - "*.qmd"
    - "guides/*.qmd"
    - "!COMPARISON-NOTES.md"
    - "!README.md"

  resources:
    - "images/**"
    - "assets/**"

format:
  html:
    theme:
      - cosmo
      - ../../_shared/themes/terminal-chic/css/theme.scss
    css:
      - assets/css/page-ui.css
    code-tools: false
    page-layout: full
    toc: true
    include-after-body: includes/footer-scripts.html

website:
  title: "Know Your Damned Computer"
  description: "Interactive Digital Humanities Computer Skills Guide"
  site-url: https://tcu-dcda.github.io/know_your_damned_computer
  repo-url: https://github.com/TCU-DCDA/know_your_damned_computer
  repo-actions: [edit, issue]

  navbar:
    title: "Know Your Damned Computer"
    background: primary
    search: true
    left:
      - text: "Guides"
        menu:
          - text: "Getting Started"
          - text: "Environment Setup"
            href: guides/environment-setup.qmd
          - text: "---"
          - text: "Fundamentals"
          - text: "File Management"
            href: guides/file-management.qmd
          - text: "File Paths"
            href: guides/file-paths.qmd
          - text: "Compression"
            href: guides/compression.qmd
          - text: "File Formats"
            href: guides/file-formats.qmd
          - text: "---"
          - text: "Tools & Techniques"
          - text: "Command Line"
            href: guides/command-line.qmd
          - text: "Text Encoding"
            href: guides/text-encoding.qmd
          - text: "Version Control (Git)"
            href: guides/version-control.qmd
          - text: "Regular Expressions"
            href: guides/regular-expressions.qmd
      - text: "Exercises"
        href: exercises/index.qmd
      - text: "About"
        href: about.qmd

  sidebar:
    - title: "Learning Path"
      style: "docked"
      contents:
        - section: "Getting Started"
          contents:
            - guides/environment-setup.qmd
        - section: "Fundamentals"
          contents:
            - guides/file-management.qmd
            - guides/file-paths.qmd
            - guides/compression.qmd
            - guides/file-formats.qmd
        - section: "Tools & Techniques"
          contents:
            - guides/command-line.qmd
            - guides/text-encoding.qmd
            - guides/version-control.qmd
            - guides/regular-expressions.qmd

  page-footer:
    left: "© 2026 Curt Rode and TCU Digital Culture & Data Analytics Program"
    center: "Licensed under [CC BY-NC-SA 4.0](https://creativecommons.org/licenses/by-nc-sa/4.0/)"
    right:
      - icon: github
        href: https://github.com/TCU-DCDA/know_your_damned_computer




# Execution options
execute:
  freeze: auto
  echo: true
  warning: false

